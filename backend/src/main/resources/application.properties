spring.application.name=team-task-manager
server.port=${PORT:8080}

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:taskdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

app.jwt.secret=${JWT_SECRET:local-development-secret-key-change-me-123456}
app.jwt.expiration-ms=86400000
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}
